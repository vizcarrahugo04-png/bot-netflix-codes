<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado - Keydd Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000000; color: white; font-family: sans-serif; }
        .netflix-card { background: #ffffff; color: #333333; max-width: 600px; margin: 20px auto; border-radius: 8px; overflow: hidden; }
        .whatsapp-float {
            position: fixed; bottom: 25px; right: 25px; background-color: #25d366; color: white;
            width: 60px; height: 60px; border-radius: 50px; display: flex; align-items: center;
            justify-content: center; font-size: 30px; box-shadow: 2px 2px 10px rgba(0,0,0,0.5); z-index: 100;
        }
        /* Ajuste para que el contenido del correo no se desborde */
        .email-content {
            all: revert;
            color: initial;
            line-height: initial;
        }
        .email-content img { max-width: 100%; height: auto; display: block; margin: 0 auto; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-2" style="background-image: radial-gradient(circle, #330000 1px, transparent 1px); background-size: 40px 40px;">
    
    <div class="netflix-card shadow-2xl">
        <div class="p-4 border-b border-zinc-100 flex justify-between items-center bg-zinc-50">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" class="w-20" alt="Netflix">
            <span class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Keydd Streaming</span>
        </div>
        
        <div class="p-4 md:p-8">
            {% if error %}
                <div class="text-center py-10">
                    <i class="fa-solid fa-circle-exclamation text-red-600 text-5xl mb-4"></i>
                    <p class="text-zinc-800 font-bold mb-6 text-lg">{{ error }}</p>
                    <a href="/" class="inline-block bg-red-600 text-white px-6 py-3 rounded-full font-bold hover:bg-red-700 transition">
                        Volver a intentar
                    </a>
                </div>
            {% else %}
                <div class="email-content">
                    {{ contenido_html | safe }}
                </div>
                
                <div class="mt-8 text-center">
                    <a href="/" class="text-zinc-400 text-sm hover:underline">
                        <i class="fa-solid fa-arrow-left mr-2"></i>Consultar otro correo
                    </a>
                </div>
            {% endif %}
        </div>

        <div class="bg-zinc-900 p-4 text-center">
            <p class="text-white text-[10px] tracking-widest uppercase">Atendido oficialmente por <strong>Keydd Streaming</strong></p>
        </div>
    </div>

    <a href="https://wa.me/51904735959?text=Hola%20Keydd%20Streaming,%20tengo%20un%20inconveniente%20con%20mi%20código" 
       class="whatsapp-float hover:scale-110 transition-transform" target="_blank">
        <i class="fa-brands fa-whatsapp"></i>
    </a>    

</body>
</html>
